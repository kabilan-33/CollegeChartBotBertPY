<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #608f95, #1a1e3b);
            color: white;
        }

        .login-box {
            margin-top: 100px;
            padding: 30px;
            background: #19313c;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-in-out;
        }

        input {
            margin-bottom: 15px;
        }

        a { color: #00d4ff; }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(30px);}
            to {opacity:1;}
        }

        @media(max-width:768px){
            .login-box { margin-top:50px; }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="col-md-4 col-md-offset-4 login-box">

        <h2>🔐 Login</h2>

        <form method="POST">
            <input class="form-control" name="username" placeholder="Username" required>

            <div style="position:relative;">
                <input id="password" class="form-control" name="password" type="password" placeholder="Password" required>
                <span onclick="togglePassword()" style="position:absolute; right:10px; top:10px; cursor:pointer;">👁</span>
            </div>

            <small id="passMsg"></small>

            <button class="btn btn-info btn-block">Login</button>
        </form>

        <br>
        <p style="text-align:center;">
            Don't have account? <a href="/register">Register</a>
        </p>

    </div>
</div>

<script>
function togglePassword() {
    let x = document.getElementById("password");
    x.type = x.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
